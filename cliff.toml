[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}{% if commit.breaking %} **BREAKING**{% endif %} \
          ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.url }}))
    {% endfor %}
{% endfor %}

{% if version -%}
    {% if previous -%}
        [{{ version | trim_start_matches(pat="v") }}]: \
        https://github.com/jamliqr/jamliquor/compare/{{ previous }}...{{ version }}
    {% else -%}
        [{{ version | trim_start_matches(pat="v") }}]: \
        https://github.com/jamliqr/jamliquor/releases/tag/{{ version }}
    {% endif -%}
{% endif -%}
"""
trim = true

[bump]
features_always_bump = true
breaking_always_bump = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore", group = "Miscellaneous Tasks" },
    { body = ".*security", group = "Security" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
